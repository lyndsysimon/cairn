services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: cairn
      POSTGRES_PASSWORD: cairn
      POSTGRES_DB: cairn
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cairn"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             uvicorn cairn.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      CAIRN_DATABASE_URL: postgresql://cairn:cairn@db:5432/cairn
      CAIRN_DEBUG: "true"
      CAIRN_ENCRYPTION_KEY: ${CAIRN_ENCRYPTION_KEY}
    volumes:
      - ./src:/app/src
      - ./alembic.ini:/app/alembic.ini
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
    depends_on:
      - api

volumes:
  pgdata:
